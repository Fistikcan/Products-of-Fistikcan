<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fistikcan · Dijital Bahçe</title>
    <style>
        :root {
            --bg: #070707;
            --surface: #111111;
            --surface-elevated: #1a1a1a;
            --accent: #93C90F;
            --accent-soft: rgba(147, 201, 15, 0.15);
            --accent-glow: rgba(147, 201, 15, 0.6);
            --text: #eaeaea;
            --text-secondary: #9a9a9a;
            --radius: 20px;
            --font-mono: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1rem;
            overflow-x: hidden;
            position: relative;
        }

        /* Particle canvas arka plan */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Product badge */
        .product-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(147, 201, 15, 0.25);
            color: #aaa;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: var(--font-mono);
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .product-badge a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: text-shadow 0.3s;
        }

        .product-badge a:hover {
            text-shadow: 0 0 12px var(--accent-glow);
        }

        /* Main wrapper */
        .main-wrapper {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
            margin-top: 2rem;
            position: relative;
            z-index: 1;
        }

        /* Hero card */
        .hero {
            width: 100%;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius);
            padding: 3rem 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(147, 201, 15, 0.1) inset;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        /* Avatar konteyneri */
        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .avatar-border {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--accent), transparent 70%);
            padding: 3px;
            animation: rotate-border 4s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes rotate-border {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            object-fit: cover;
            animation: avatar-pulse 2s ease-in-out infinite;
            transition: all 0.4s ease;
        }

        @keyframes avatar-pulse {
            0%,
            100% {
                box-shadow: 0 0 20px var(--accent-soft);
            }
            50% {
                box-shadow: 0 0 40px var(--accent-glow), 0 0 60px rgba(147, 201, 15, 0.3);
            }
        }

        .avatar-container:hover .avatar {
            transform: scale(1.05) rotate(2deg);
            box-shadow: 0 0 50px var(--accent-glow), 0 0 80px rgba(147, 201, 15, 0.4);
        }

        .hero-name {
            font-size: 2.4rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: white;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .hero-bio {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto 1.5rem;
            line-height: 1.5;
            font-weight: 400;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-soft);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #777;
        }

        /* Sections */
        .section {
            width: 100%;
            text-align: center;
        }

        .section-title {
            font-family: var(--font-mono);
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            display: inline-block;
            margin-bottom: 2rem;
            text-shadow: 0 0 12px var(--accent-soft);
            transition: text-shadow 0.3s;
            position: relative;
            cursor: default;
        }

        .section-title:hover {
            text-shadow: 0 0 25px var(--accent-glow);
        }

        .glitch-active {
            animation: glitch-skew 0.3s ease-in-out;
        }

        @keyframes glitch-skew {
            0% {
                transform: translate(0);
                text-shadow: -2px 0 red, 2px 0 blue;
            }
            20% {
                transform: translate(-3px, 2px);
                text-shadow: 2px 0 red, -2px 0 blue;
            }
            40% {
                transform: translate(3px, -1px);
                text-shadow: -1px 0 red, 1px 0 blue;
            }
            60% {
                transform: translate(-1px, 1px);
                text-shadow: 1px 0 red, -1px 0 blue;
            }
            80% {
                transform: translate(2px, -2px);
                text-shadow: -2px 0 red, 2px 0 blue;
            }
            100% {
                transform: translate(0);
                text-shadow: 0 0 15px var(--accent-glow);
            }
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--accent);
            margin-left: 6px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* Cards dikey sıralı, ortada */
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
        }

        .card {
            width: 100%;
            background: var(--surface-elevated);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.8rem 2rem;
            text-align: left;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease, transform 0.6s ease, box-shadow 0.35s, border-color 0.35s;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(147, 201, 15, 0.5);
            box-shadow: 0 16px 35px rgba(147, 201, 15, 0.18);
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.35s ease;
        }

        .card:hover::before {
            transform: scaleY(1);
        }

        .card-title {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 1.2rem;
            color: white;
            margin-bottom: 0.4rem;
        }

        .card-desc {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            gap: 1.2rem;
            font-size: 0.8rem;
            color: #777;
            font-family: var(--font-mono);
        }

        .language-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            margin-right: 4px;
            vertical-align: middle;
        }

        .loading {
            color: #888;
            font-family: var(--font-mono);
            padding: 2rem;
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        .error-state {
            color: #ff6b6b;
        }

        /* footer */
        .footer {
            margin-top: 4rem;
            color: #444;
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        @media (max-width: 500px) {
            body {
                padding: 1.5rem 0.8rem;
            }
            .product-badge {
                top: 10px;
                left: 10px;
                font-size: 0.7rem;
                padding: 0.3rem 0.8rem;
            }
            .hero {
                padding: 2rem 1.2rem;
            }
            .hero-name {
                font-size: 1.8rem;
            }
            .stats {
                gap: 1.5rem;
            }
            .section-title {
                font-size: 1.6rem;
            }
            .card {
                padding: 1.3rem 1.4rem;
            }
        }
    </style>
</head>
<body>
    <!-- Arka plan parçacıkları için canvas -->
    <canvas id="particles-canvas"></canvas>

    <div class="product-badge">
        🧬 Product of <a href="https://github.com/Fistikcan" target="_blank">@Fistikcan</a>
    </div>

    <main class="main-wrapper">
        <!-- Hero / Hakkımda -->
        <div class="hero" id="hero">
            <div class="avatar-container">
                <div class="avatar-border">
                    <img class="avatar" id="avatar" src="" alt="avatar" loading="lazy">
                </div>
            </div>
            <h1 class="hero-name" id="hero-name">Fistikcan</h1>
            <p class="hero-bio" id="hero-bio">Yükleniyor...</p>
            <div class="stats" id="stats"></div>
        </div>

        <!-- Projeler -->
        <section class="section">
            <h2 class="section-title" id="projeler-title">
                <span class="title-text">&lt;Projeler/&gt;</span><span class="cursor"></span>
            </h2>
            <div class="cards-list" id="projects-container">
                <div class="loading">Depolar yükleniyor...</div>
            </div>
        </section>

        <!-- Rehberler (Gists) -->
        <section class="section">
            <h2 class="section-title" id="guide-title">
                <span class="title-text">def Rehber():</span><span class="cursor"></span>
            </h2>
            <div class="cards-list" id="guides-container">
                <div class="loading">Rehberler yükleniyor...</div>
            </div>
        </section>

        <div class="footer">
            &copy; 2025 – Dijital Bahçe
        </div>
    </main>

    <script>
        (function() {
            // --- Arka plan parçacık efekti ---
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const particleColor = '#93C90F';
            const particleCount = 70;

            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', () => {
                resizeCanvas();
                initParticles();
            });

            class Particle {
                constructor() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.4;
                    this.speedY = (Math.random() - 0.5) * 0.4;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                    if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(147, 201, 15, ${this.opacity})`;
                    ctx.fill();
                }
            }

            function initParticles() {
                particles = [];
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle());
                }
            }

            function animateParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let p of particles) {
                    p.update();
                    p.draw();
                }
                requestAnimationFrame(animateParticles);
            }

            resizeCanvas();
            initParticles();
            animateParticles();

            // --- Glitch efekti hover ile (sabit başlık) ---
            document.querySelectorAll('.section-title').forEach(title => {
                title.addEventListener('mouseenter', () => {
                    title.classList.add('glitch-active');
                });
                title.addEventListener('animationend', () => {
                    title.classList.remove('glitch-active');
                });
            });

            // --- Kartlar için reveal animasyonu (Intersection Observer) ---
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        observer.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.1 });

            function observeCards() {
                document.querySelectorAll('.card').forEach(card => {
                    observer.observe(card);
                });
            }

            // --- GitHub API ---
            const username = 'Fistikcan';

            async function fetchUserProfile() {
                try {
                    const res = await fetch(`https://api.github.com/users/${username}`);
                    if (!res.ok) throw new Error('Kullanıcı bilgisi alınamadı');
                    const data = await res.json();
                    document.getElementById('avatar').src = data.avatar_url || '';
                    document.getElementById('hero-name').textContent = data.name || data.login;
                    document.getElementById('hero-bio').textContent = data.bio || 'Kod yazmayı seven biri.';
                    const statsHTML = `
                        <div class="stat-item"><span class="stat-number">${data.public_repos}</span><span class="stat-label">Repo</span></div>
                        <div class="stat-item"><span class="stat-number">${data.followers}</span><span class="stat-label">Takipçi</span></div>
                        <div class="stat-item"><span class="stat-number">${data.following}</span><span class="stat-label">Takip</span></div>
                        ${data.public_gists ? `<div class="stat-item"><span class="stat-number">${data.public_gists}</span><span class="stat-label">Rehber</span></div>` : ''}
                    `;
                    document.getElementById('stats').innerHTML = statsHTML;
                } catch (err) {
                    document.getElementById('hero-bio').textContent = 'Bilgiler şu an yüklenemedi.';
                }
            }

            async function fetchRepos() {
                const container = document.getElementById('projects-container');
                try {
                    const res = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=20`);
                    if (!res.ok) throw new Error('Limit aşımı veya hata');
                    let repos = await res.json();
                    // "Products-of-Fistikcan" reposunu filtrele
                    repos = repos.filter(repo => repo.name !== 'Products-of-Fistikcan');
                    if (repos.length === 0) {
                        container.innerHTML = '<div class="loading">Henüz repo bulunmuyor.</div>';
                        return;
                    }
                    container.innerHTML = repos.map(repo => `
                        <a href="${repo.html_url}" target="_blank" rel="noopener" class="card">
                            <div class="card-title">📁 ${escapeHTML(repo.name)}</div>
                            <div class="card-desc">${escapeHTML(repo.description || 'Açıklama yok.')}</div>
                            <div class="card-meta">
                                <span>⭐ ${repo.stargazers_count}</span>
                                <span>🍴 ${repo.forks_count}</span>
                                ${repo.language ? `<span><span class="language-dot"></span>${escapeHTML(repo.language)}</span>` : ''}
                            </div>
                        </a>
                    `).join('');
                    observeCards();
                } catch (err) {
                    container.innerHTML = `<div class="error-state loading">⚠️ Projeler yüklenemedi: ${escapeHTML(err.message)}</di
