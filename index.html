<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fistikcan • Ürünü</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-light: #1e1e1e;
            --accent: #93C90F;
            --accent-glow: rgba(147, 201, 15, 0.3);
            --text: #e0e0e0;
            --text-muted: #888;
            --radius: 16px;
            --font-mono: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            line-height: 1.6;
            min-height: 100vh;
            background-image: radial-gradient(ellipse at 50% 0%, rgba(147, 201, 15, 0.08) 0%, transparent 70%);
            overflow-x: hidden;
        }

        /* Product badge */
        .product-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--surface);
            border: 1px solid rgba(147, 201, 15, 0.3);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-family: var(--font-mono);
            z-index: 100;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: default;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        .product-badge a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            position: relative;
            transition: color 0.3s;
        }

        .product-badge a:hover {
            color: #b5f02e;
            text-shadow: 0 0 12px var(--accent-glow);
        }

        .product-badge a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
            transform-origin: right;
        }

        .product-badge a:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Main container */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 24px 60px;
        }

        /* Section styling */
        .section {
            margin-bottom: 80px;
            animation: fadeInUp 0.8s ease forwards;
            opacity: 0;
            animation-delay: calc(var(--i) * 0.15s);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section-header {
            margin-bottom: 36px;
            position: relative;
        }

        .section-title {
            font-family: var(--font-mono);
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--accent);
            display: inline-block;
            position: relative;
            text-shadow: 0 0 15px var(--accent-glow);
            transition: none;
        }

        .glitch-active {
            animation: glitch-skew 0.3s ease-in-out;
        }

        @keyframes glitch-skew {
            0% {
                transform: translate(0);
                text-shadow: -2px 0 red, 2px 0 blue;
            }
            20% {
                transform: translate(-3px, 2px);
                text-shadow: 2px 0 red, -2px 0 blue;
            }
            40% {
                transform: translate(3px, -1px);
                text-shadow: -1px 0 red, 1px 0 blue;
            }
            60% {
                transform: translate(-1px, 1px);
                text-shadow: 1px 0 red, -1px 0 blue;
            }
            80% {
                transform: translate(2px, -2px);
                text-shadow: -2px 0 red, 2px 0 blue;
            }
            100% {
                transform: translate(0);
                text-shadow: 0 0 15px var(--accent-glow);
            }
        }

        /* Typewriter cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: var(--accent);
            margin-left: 4px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 8px var(--accent);
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--radius);
            padding: 24px;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(6px);
            cursor: default;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .card:hover {
            transform: translateY(-6px);
            border-color: rgba(147, 201, 15, 0.4);
            box-shadow: 0 16px 40px rgba(147, 201, 15, 0.15);
            background: #1a1a1a;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }

        .card:hover::before {
            transform: translateX(100%);
        }

        .card-title {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .card-desc {
            color: #aaa;
            font-size: 0.9rem;
            flex-grow: 1;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 0.8rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .language-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
        }

        .card-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            align-self: flex-end;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .card-link:hover {
            color: #c4ff47;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Loading state */
        .loading {
            text-align: center;
            color: var(--text-muted);
            font-family: var(--font-mono);
            padding: 40px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(147, 201, 15, 0.7);
            }
            50% {
                box-shadow: 0 0 0 12px rgba(147, 201, 15, 0);
            }
        }

        /* Error */
        .error-state {
            color: #ff6b6b;
            text-align: center;
            padding: 20px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .container {
                padding: 80px 16px 40px;
            }
            .section-title {
                font-size: 1.6rem;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .product-badge {
                top: 10px;
                left: 10px;
                font-size: 0.7rem;
                padding: 5px 10px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <!-- Product Badge -->
    <div class="product-badge">
        🧬 Product of <a href="https://github.com/Fistikcan" target="_blank" rel="noopener">@Fistikcan</a>
    </div>

    <!-- Main Content -->
    <div class="container">
        <!-- Projeler Section -->
        <section class="section" style="--i:1">
            <div class="section-header">
                <h2 class="section-title" id="projeler-title">
                    <span class="title-text">// Projeler</span><span class="cursor"></span>
                </h2>
            </div>
            <div class="cards-grid" id="projects-container">
                <div class="loading">Depolar yükleniyor</div>
            </div>
        </section>

        <!-- Guide / Rehber Section -->
        <section class="section" style="--i:2">
            <div class="section-header">
                <h2 class="section-title" id="guide-title">
                    <span class="title-text"># Rehber</span><span class="cursor"></span>
                </h2>
            </div>
            <div class="cards-grid" id="guides-container">
                <div class="loading">Rehberler yükleniyor</div>
            </div>
        </section>
    </div>

    <script>
        (function() {
            // --- Glitch Title Changer ---
            const titleConfigs = {
                projeler: [
                    '</Projeler>',
                    'def Projeler():',
                    '<!-- Projeler -->',
                    '# Projeler',
                    '// Projeler',
                    '/* Projeler */',
                    'Projeler::',
                    'project Projeler',
                    'function Projeler()',
                    'class Projeler:',
                    '{ Projeler }',
                ],
                guide: [
                    '</Rehber>',
                    'def Rehber():',
                    '<!-- Rehber -->',
                    '# Rehber',
                    '// Rehber',
                    '/* Rehber */',
                    'Rehber::',
                    'guide Rehber',
                    'func Rehber()',
                    'class Rehber:',
                    '@Rehber',
                ]
            };

            function setupGlitchTitle(elementId, titlesArray) {
                const titleElement = document.getElementById(elementId);
                if (!titleElement) return;
                const textSpan = titleElement.querySelector('.title-text');
                const cursor = titleElement.querySelector('.cursor');
                if (!textSpan) return;

                let currentIndex = Math.floor(Math.random() * titlesArray.length);
                textSpan.textContent = titlesArray[currentIndex];

                setInterval(() => {
                    // Trigger glitch animation
                    titleElement.classList.add('glitch-active');
                    // Randomly pick a new title different from current
                    let newIndex;
                    do {
                        newIndex = Math.floor(Math.random() * titlesArray.length);
                    } while (newIndex === currentIndex && titlesArray.length > 1);
                    currentIndex = newIndex;

                    // Change text slightly after animation starts for realism
                    setTimeout(() => {
                        textSpan.textContent = titlesArray[currentIndex];
                    }, 80);

                    // Remove glitch class after animation duration
                    setTimeout(() => {
                        titleElement.classList.remove('glitch-active');
                    }, 350);
                }, 1200); // change every 1.2 seconds
            }

            setupGlitchTitle('projeler-title', titleConfigs.projeler);
            setupGlitchTitle('guide-title', titleConfigs.guide);

            // --- GitHub API Fetch ---
            const username = 'Fistikcan';
            const projectsContainer = document.getElementById('projects-container');
            const guidesContainer = document.getElementById('guides-container');

            async function fetchRepos() {
                try {
                    const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=20`);
                    if (!response.ok) throw new Error('GitHub API limit aşıldı veya hata oluştu.');
                    const repos = await response.json();
                    if (repos.length === 0) {
                        projectsContainer.innerHTML =
                            '<div class="loading">Henüz herkese açık repo bulunamadı.</div>';
                        return;
                    }
                    projectsContainer.innerHTML = repos.map(repo => `
                        <div class="card">
                            <div class="card-title">📁 ${escapeHTML(repo.name)}</div>
                            <div class="card-desc">${escapeHTML(repo.description || 'Açıklama yok.')}</div>
                            <div class="card-meta">
                                <span>⭐ ${repo.stargazers_count}</span>
                                <span>🍴 ${repo.forks_count}</span>
                                ${repo.language ? `<span><span class="language-dot"></span> ${escapeHTML(repo.language)}</span>` : ''}
                            </div>
                            <a href="${repo.html_url}" target="_blank" rel="noopener" class="card-link">
                                Repoya Git ↗
                            </a>
                        </div>
                    `).join('');
                } catch (error) {
                    projectsContainer.innerHTML = `<div class="error-state">⚠️ Projeler yüklenemedi: ${escapeHTML(error.message)}</div>`;
                }
            }

            async function fetchGists() {
                try {
                    const response = await fetch(`https://api.github.com/users/${username}/gists?per_page=12`);
                    if (!response.ok) throw new Error('Gist verisi alınamadı.');
                    const gists = await response.json();
                    if (gists.length === 0) {
                        guidesContainer.innerHTML =
                            '<div class="loading">Henüz herkese açık rehber (gist) bulunamadı.</div>';
                        return;
                    }
                    guidesContainer.innerHTML = gists.map(gist => {
                        const title = Object.keys(gist.files)[0] || 'Rehber';
                        const description = gist.description || 'Açıklama yok.';
                        return `
                        <div class="card">
                            <div class="card-title">📝 ${escapeHTML(title)}</div>
                            <div class="card-desc">${escapeHTML(description)}</div>
                            <div class="card-meta">
                                <span>📅 ${new Date(gist.created_at).toLocaleDateString('tr-TR')}</span>
                                <span>💬 ${gist.comments} yorum</span>
                            </div>
                            <a href="${gist.html_url}" target="_blank" rel="noopener" class="card-link">
                                Rehberi Görüntüle ↗
                            </a>
                        </div>
                    `;
                    }).join('');
                } catch (error) {
                    guidesContainer.innerHTML =
                        `<div class="error-state">⚠️ Rehberler yüklenemedi: ${escapeHTML(error.message)}</div>`;
                }
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // Initial fetches
            fetchRepos();
            fetchGists();

            // Optional: Refresh every 5 minutes to handle API caching gracefully
            setInterval(() => {
                fetchRepos();
                fetchGists();
            }, 300000);
        })();
    </script>
</body>
    </html>
