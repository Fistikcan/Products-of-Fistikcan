<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fistikcan · Dijital Bahçe</title>
    <style>
        :root {
            --bg: #070707;
            --surface: #111111;
            --surface-elevated: #1a1a1a;
            --accent: #93C90F;
            --accent-soft: rgba(147, 201, 15, 0.15);
            --accent-glow: rgba(147, 201, 15, 0.5);
            --text: #eaeaea;
            --text-secondary: #9a9a9a;
            --radius: 20px;
            --font-mono: 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 2rem 1rem;
            background-image:
                radial-gradient(circle at 30% 40%, rgba(147, 201, 15, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(147, 201, 15, 0.04) 0%, transparent 50%);
            overflow-x: hidden;
        }

        /* Product badge */
        .product-badge {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(147, 201, 15, 0.25);
            color: #aaa;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-family: var(--font-mono);
            z-index: 100;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transition: all 0.3s;
        }

        .product-badge a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
            transition: text-shadow 0.3s;
        }

        .product-badge a:hover {
            text-shadow: 0 0 12px var(--accent-glow);
        }

        /* Main wrapper */
        .main-wrapper {
            width: 100%;
            max-width: 720px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4rem;
            margin-top: 2rem;
        }

        /* Hero card */
        .hero {
            width: 100%;
            background: var(--surface);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: var(--radius);
            padding: 3rem 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(147, 201, 15, 0.1) inset;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-8px);
            }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: 0 0 25px var(--accent-soft);
            margin-bottom: 1.5rem;
            transition: all 0.4s;
        }

        .hero:hover .avatar {
            box-shadow: 0 0 40px var(--accent-glow);
            transform: scale(1.02);
        }

        .hero-name {
            font-size: 2.4rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: white;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .hero-bio {
            color: var(--text-secondary);
            font-size: 1rem;
            max-width: 400px;
            margin: 0 auto 1.5rem;
            line-height: 1.5;
            font-weight: 400;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            flex-wrap: wrap;
            margin-top: 1rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #777;
        }

        /* Sections */
        .section {
            width: 100%;
            text-align: center;
        }

        .section-title {
            font-family: var(--font-mono);
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            display: inline-block;
            margin-bottom: 2rem;
            text-shadow: 0 0 12px var(--accent-soft);
            transition: none;
            position: relative;
        }

        .glitch-active {
            animation: glitch-skew 0.3s ease-in-out;
        }

        @keyframes glitch-skew {
            0% {
                transform: translate(0);
                text-shadow: -2px 0 red, 2px 0 blue;
            }
            20% {
                transform: translate(-3px, 2px);
                text-shadow: 2px 0 red, -2px 0 blue;
            }
            40% {
                transform: translate(3px, -1px);
                text-shadow: -1px 0 red, 1px 0 blue;
            }
            60% {
                transform: translate(-1px, 1px);
                text-shadow: 1px 0 red, -1px 0 blue;
            }
            80% {
                transform: translate(2px, -2px);
                text-shadow: -2px 0 red, 2px 0 blue;
            }
            100% {
                transform: translate(0);
                text-shadow: 0 0 15px var(--accent-glow);
            }
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background: var(--accent);
            margin-left: 6px;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
            box-shadow: 0 0 10px var(--accent);
        }

        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }

        /* Cards dikey sıralı, ortada */
        .cards-list {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
        }

        .card {
            width: 100%;
            background: var(--surface-elevated);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.8rem 2rem;
            text-align: left;
            transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
            backdrop-filter: blur(6px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(147, 201, 15, 0.5);
            box-shadow: 0 16px 35px rgba(147, 201, 15, 0.18);
        }

        .card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--accent);
            transform: scaleY(0);
            transition: transform 0.35s ease;
        }

        .card:hover::before {
            transform: scaleY(1);
        }

        .card-title {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 1.2rem;
            color: white;
            margin-bottom: 0.4rem;
        }

        .card-desc {
            color: #aaa;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .card-meta {
            display: flex;
            gap: 1.2rem;
            font-size: 0.8rem;
            color: #777;
            font-family: var(--font-mono);
        }

        .language-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            margin-right: 4px;
            vertical-align: middle;
        }

        .loading {
            color: #888;
            font-family: var(--font-mono);
            padding: 2rem;
            animation: pulse-text 2s infinite;
        }

        @keyframes pulse-text {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        .error-state {
            color: #ff6b6b;
        }

        /* footer */
        .footer {
            margin-top: 4rem;
            color: #444;
            font-size: 0.8rem;
            font-family: var(--font-mono);
        }

        @media (max-width: 500px) {
            .hero {
                padding: 2rem 1.2rem;
            }
            .hero-name {
                font-size: 1.8rem;
            }
            .stats {
                gap: 1.5rem;
            }
            .card {
                padding: 1.3rem 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="product-badge">
        🧬 Product of <a href="https://github.com/Fistikcan" target="_blank">@Fistikcan</a>
    </div>

    <main class="main-wrapper">
        <!-- Hero / Hakkımda -->
        <div class="hero" id="hero">
            <img class="avatar" id="avatar" src="" alt="avatar" loading="lazy">
            <h1 class="hero-name" id="hero-name">Fistikcan</h1>
            <p class="hero-bio" id="hero-bio">Yükleniyor...</p>
            <div class="stats" id="stats"></div>
        </div>

        <!-- Projeler -->
        <section class="section">
            <h2 class="section-title" id="projeler-title">
                <span class="title-text">// Projeler</span><span class="cursor"></span>
            </h2>
            <div class="cards-list" id="projects-container">
                <div class="loading">Depolar yükleniyor...</div>
            </div>
        </section>

        <!-- Rehberler (Gists) -->
        <section class="section">
            <h2 class="section-title" id="guide-title">
                <span class="title-text"># Rehber</span><span class="cursor"></span>
            </h2>
            <div class="cards-list" id="guides-container">
                <div class="loading">Rehberler yükleniyor...</div>
            </div>
        </section>

        <div class="footer">
            &copy; 2025 – Dijital Bahçe
        </div>
    </main>

    <script>
        (function() {
            // --- Glitch Title Changer ---
            const titleSets = {
                projeler: [
                    '</Projeler>',
                    'def Projeler():',
                    '<!-- Projeler -->',
                    '# Projeler',
                    '// Projeler',
                    '/* Projeler */',
                    'Projeler::',
                    'project Projeler',
                    'function Projeler()',
                    'class Projeler:',
                    '{ Projeler }',
                ],
                guide: [
                    '</Rehber>',
                    'def Rehber():',
                    '<!-- Rehber -->',
                    '# Rehber',
                    '// Rehber',
                    '/* Rehber */',
                    'Rehber::',
                    'guide Rehber',
                    'func Rehber()',
                    'class Rehber:',
                    '@Rehber',
                ]
            };

            function initGlitchTitle(elementId, titles) {
                const el = document.getElementById(elementId);
                if (!el) return;
                const span = el.querySelector('.title-text');
                if (!span) return;
                let currentIndex = Math.floor(Math.random() * titles.length);
                span.textContent = titles[currentIndex];

                setInterval(() => {
                    el.classList.add('glitch-active');
                    let newIndex;
                    do {
                        newIndex = Math.floor(Math.random() * titles.length);
                    } while (newIndex === currentIndex && titles.length > 1);
                    currentIndex = newIndex;
                    setTimeout(() => {
                        span.textContent = titles[currentIndex];
                    }, 70);
                    setTimeout(() => {
                        el.classList.remove('glitch-active');
                    }, 350);
                }, 1300);
            }

            initGlitchTitle('projeler-title', titleSets.projeler);
            initGlitchTitle('guide-title', titleSets.guide);

            // --- GitHub Data Fetching ---
            const username = 'Fistikcan';

            async function fetchUserProfile() {
                try {
                    const res = await fetch(`https://api.github.com/users/${username}`);
                    if (!res.ok) throw new Error('Kullanıcı bilgisi alınamadı');
                    const data = await res.json();
                    document.getElementById('avatar').src = data.avatar_url || '';
                    document.getElementById('hero-name').textContent = data.name || data.login;
                    document.getElementById('hero-bio').textContent = data.bio || 'Kod yazmayı seven biri.';
                    const statsHTML = `
                        <div class="stat-item"><span class="stat-number">${data.public_repos}</span><span class="stat-label">Repo</span></div>
                        <div class="stat-item"><span class="stat-number">${data.followers}</span><span class="stat-label">Takipçi</span></div>
                        <div class="stat-item"><span class="stat-number">${data.following}</span><span class="stat-label">Takip</span></div>
                        ${data.public_gists ? `<div class="stat-item"><span class="stat-number">${data.public_gists}</span><span class="stat-label">Rehber</span></div>` : ''}
                    `;
                    document.getElementById('stats').innerHTML = statsHTML;
                } catch (err) {
                    document.getElementById('hero-bio').textContent = 'Bilgiler şu an yüklenemedi.';
                }
            }

            async function fetchRepos() {
                const container = document.getElementById('projects-container');
                try {
                    const res = await fetch(`https://api.github.com/users/${username}/repos?sort=updated&per_page=15`);
                    if (!res.ok) throw new Error('Limit aşımı veya hata');
                    const repos = await res.json();
                    if (repos.length === 0) {
                        container.innerHTML = '<div class="loading">Henüz repo bulunmuyor.</div>';
                        return;
                    }
                    container.innerHTML = repos.map(repo => `
                        <a href="${repo.html_url}" target="_blank" rel="noopener" class="card">
                            <div class="card-title">📁 ${escapeHTML(repo.name)}</div>
                            <div class="card-desc">${escapeHTML(repo.description || 'Açıklama yok.')}</div>
                            <div class="card-meta">
                                <span>⭐ ${repo.stargazers_count}</span>
                                <span>🍴 ${repo.forks_count}</span>
                                ${repo.language ? `<span><span class="language-dot"></span>${escapeHTML(repo.language)}</span>` : ''}
                            </div>
                        </a>
                    `).join('');
                } catch (err) {
                    container.innerHTML = `<div class="error-state loading">⚠️ Projeler yüklenemedi: ${escapeHTML(err.message)}</div>`;
                }
            }

            async function fetchGists() {
                const container = document.getElementById('guides-container');
                try {
                    const res = await fetch(`https://api.github.com/users/${username}/gists?per_page=10`);
                    if (!res.ok) throw new Error('Gist verisi alınamadı');
                    const gists = await res.json();
                    if (gists.length === 0) {
                        container.innerHTML = '<div class="loading">Henüz rehber bulunmuyor.</div>';
                        return;
                    }
                    container.innerHTML = gists.map(gist => {
                        const title = Object.keys(gist.files)[0] || 'Rehber';
                        return `
                        <a href="${gist.html_url}" target="_blank" rel="noopener" class="card">
                            <div class="card-title">📝 ${escapeHTML(title)}</div>
                            <div class="card-desc">${escapeHTML(gist.description || 'Açıklama yok.')}</div>
                            <div class="card-meta">
                                <span>📅 ${new Date(gist.created_at).toLocaleDateString('tr-TR')}</span>
                                <span>💬 ${gist.comments} yorum</span>
                            </div>
                        </a>
                    `;
                    }).join('');
                } catch (err) {
                    container.innerHTML = `<div class="error-state loading">⚠️ Rehberler yüklenemedi: ${escapeHTML(err.message)}</div>`;
                }
            }

            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // Başlat
            fetchUserProfile();
            fetchRepos();
            fetchGists();

            // 5 dakikada bir güncelle
            setInterval(() => {
                fetchRepos();
                fetchGists();
            }, 300000);
        })();
    </script>
</body>
</html>
